<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gateway Prober</title>
  <meta name="description" content="检测 OpenAI 兼容网关支持哪些端点、模型与能力。">
  <link rel="canonical" href="https://lizehao.asia/">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Gateway Capability Probe</h1>
      <p class="sub">输入兼容 OpenAI 的网关地址和 Key，自动检测常见端点、可用模型、能力强弱和常见兼容问题。</p>
      <div class="navrow">
        <a class="navlink" href="/docs-page/">查看详细说明</a>
        <a class="navlink" href="https://github.com/lizehao-1/gateway-prober" target="_blank" rel="noreferrer">GitHub 项目</a>
      </div>
    </section>

    <section class="panel">
      <form id="probe-form">
        <div class="grid">
          <label>Base URL
            <input id="base-url" name="base_url" placeholder="https://example.com/v1" required>
          </label>
          <label>API Key
            <input id="api-key" name="api_key" type="password" placeholder="sk-..." required>
          </label>
          <label>Timeout (seconds)
            <input id="timeout" name="timeout" type="number" min="1" max="120" value="20" required>
          </label>
          <label>Probe Mode
            <select id="probe-mode" name="probe_mode">
              <option value="quick">Quick（常见端点，速度优先）</option>
              <option value="deep">Deep（更多前缀，兼容优先）</option>
            </select>
          </label>
          <label>Endpoint Strategy
            <select id="endpoint-strategy" name="endpoint_strategy">
              <option value="append">Append（保留默认端点，再追加你写的路径）</option>
              <option value="custom_only">Custom Only（只测你写的路径和预设）</option>
            </select>
          </label>
        </div>

        <div class="grid-wide">
          <label>Endpoint Paths
            <textarea id="endpoint-paths" name="endpoint_paths" placeholder="/v1/responses, /v1/chat/completions&#10;/v1/images/edits, /v1/audio/translations&#10;也支持 JSON 数组"></textarea>
          </label>
          <label>Text Test Models
            <textarea id="text-models" name="text_models" placeholder="留空时会优先从 /models 里按主力文本模型排序挑选"></textarea>
          </label>
          <label>Vision Test Models
            <textarea id="vision-models" name="vision_models" placeholder="留空时会优先从 /models 里按主力视觉模型排序挑选"></textarea>
          </label>
        </div>

        <label>Enabled Probes
          <div class="checks" id="probe-options"></div>
          <span class="hint">默认先测最常用的文本能力，Images 默认关闭，避免首次探测过慢。Capabilities 最值得在准备正式接入时打开，因为它会补充模型级细扫、接入建议和完整报告。手填路径或高级预设时，Extra Endpoints 会自动加入。</span>
        </label>

        <label>高级预设
          <div class="checks" id="preset-options"></div>
        </label>

        <div class="actions">
          <button type="submit" id="submit-button">开始探测</button>
          <span class="hint" id="estimate-hint">预计耗时会根据探测项动态变化。</span>
        </div>
      </form>

      <p class="notice hidden" id="notice"></p>
      <p class="error hidden" id="error"></p>

      <div class="progress hidden" id="progress">
        <div class="spinner"></div>
        <div>
          <strong id="progress-title">正在检测，请稍候。</strong>
          <p class="hint" id="progress-detail">请求进行中，Cloudflare Pages 版会在完成后一次性返回结果。</p>
        </div>
      </div>
    </section>

    <section class="panel hidden" id="results-panel">
      <div class="summary" id="summary-chips"></div>
      <div class="rankings hidden" id="ranking-chips"></div>
      <div class="report hidden" id="summary-panel">
        <div class="topline">
          <strong>整体总结</strong>
          <span class="hint" id="selection-hint"></span>
        </div>
        <p class="summary-text" id="callout"></p>
      </div>
      <div class="report hidden" id="report-panel">
        <div class="topline">
          <strong>完整报告</strong>
          <button type="button" id="copy-report-button">复制报告</button>
        </div>
        <pre id="report-body"></pre>
      </div>
      <div class="cards" id="results-cards"></div>
    </section>
  </main>

  <template id="card-template">
    <article class="card">
      <div class="topline">
        <strong class="name"></strong>
        <span class="status"></span>
      </div>
      <div class="meta"></div>
      <p class="summary-text"></p>
      <div class="mini"></div>
      <details>
        <summary>查看详情</summary>
        <pre class="details"></pre>
      </details>
    </article>
  </template>

  <script src="/app.js" defer></script>
</body>
</html>
